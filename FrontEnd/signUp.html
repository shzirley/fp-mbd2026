<body
    class="bg-background text-on-surface font-body-md antialiased min-h-screen flex selection:bg-primary-container selection:text-on-primary-container">
    <!-- Split Screen Layout -->
    <main class="flex w-full min-h-screen">
        <!-- Left Side: Cinematic Graphic (Hidden on mobile) -->
        <div class="hidden lg:block lg:w-5/12 xl:w-1/2 relative overflow-hidden bg-surface-container-lowest">
            <div class="absolute inset-0 bg-gradient-to-r from-background/40 to-background/90 z-10"></div>
            <img alt="Cinematic theater interior" class="absolute inset-0 w-full h-full object-cover object-center z-0"
                src="https://lh3.googleusercontent.com/aida/AP1WRLs46v1HNlK7a9ixhJuRRkYs23RLSqshrLI9k6LWydrUCu01tpHSoKvcefeX0HFv5nXhDSHgpj08QsaV2y9HoTjzx92WLbc1h0p8-ykARj73ckFPhGfpPJvDGpnAFsza5R0cbp-aQbZq4FYyovuiuOCi-EmH8kNLSmcqtEvHYs2IG4X1YvBgwBXDf9T0AuUtt6JFdbPurg88V2gJf6sVNesPEM5ubRzlqs3VT3_-2_Udk8KW4lvJAxCa8MU">
            <div class="absolute bottom-12 left-12 z-20 max-w-md">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-4xl"
                        style="font-variation-settings: 'FILL' 1;">movie_filter</span>
                    <h1 class="font-display-lg text-headline-lg tracking-tighter text-white">Cinetrack</h1>
                </div>
                <p class="font-body-lg text-body-lg text-on-surface-variant">Your premier destination for immersive
                    cinematic experiences and exclusive VIP access.</p>
            </div>
        </div>
        <!-- Right Side: Registration Form -->
        <div
            class="w-full lg:w-7/12 xl:w-1/2 flex items-center justify-center p-6 sm:p-12 lg:p-margin_desktop relative z-20">
            <!-- Glassmorphism Container -->
            <div
                class="w-full max-w-lg bg-surface-container/60 backdrop-blur-xl border border-white/5 rounded-2xl p-8 sm:p-10 shadow-2xl relative overflow-hidden">
                <!-- Subtle decorative highlight -->
                <div
                    class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent">
                </div>
                <div class="mb-8">
                    <h2 class="font-headline-md text-headline-md text-white mb-2">Create Account</h2>
                    <p class="text-on-surface-variant font-body-md text-sm">Join the club. Unlock premium bookings and
                        rewards.</p>
                </div>
                <form class="space-y-5">
                    <div class="space-y-1.5">
                        <label class="font-label-md text-label-md text-on-surface-variant block" for="fullName">Full
                            Name</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-surface-container-highest/50 border border-outline-variant/30 rounded-lg text-on-surface font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-colors placeholder:text-outline-variant/70"
                                id="fullName" placeholder="John Doe" type="text">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="font-label-md text-label-md text-on-surface-variant block" for="phone">Phone
                            Number</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">call</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-surface-container-highest/50 border border-outline-variant/30 rounded-lg text-on-surface font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-colors placeholder:text-outline-variant/70"
                                id="phone" placeholder="+1 (555) 000-0000" type="tel">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email
                            Address</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-surface-container-highest/50 border border-outline-variant/30 rounded-lg text-on-surface font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-colors placeholder:text-outline-variant/70"
                                id="email" placeholder="john@example.com" type="email">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="space-y-1.5">
                            <label class="font-label-md text-label-md text-on-surface-variant block"
                                for="password">Password</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
                                <input
                                    class="w-full pl-10 pr-4 py-3 bg-surface-container-highest/50 border border-outline-variant/30 rounded-lg text-on-surface font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-colors placeholder:text-outline-variant/70"
                                    id="password" placeholder="••••••••" type="password">
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="font-label-md text-label-md text-on-surface-variant block"
                                for="confirmPassword">Confirm Password</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
                                <input
                                    class="w-full pl-10 pr-4 py-3 bg-surface-container-highest/50 border border-outline-variant/30 rounded-lg text-on-surface font-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-colors placeholder:text-outline-variant/70"
                                    id="confirmPassword" placeholder="••••••••" type="password">
                            </div>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button
                            onclick="handleSignUp()"
                            class="w-full py-3.5 px-6 bg-primary-container text-white font-label-md text-label-md rounded-lg shadow-[0_0_15px_rgba(225,29,72,0.3)] hover:shadow-[0_0_25px_rgba(225,29,72,0.5)] hover:bg-inverse-primary transition-all duration-300 transform active:scale-[0.98]"
                            type="button">
                            Create Account
                        </button>
                    </div>
                    <div class="relative py-4 flex items-center justify-center">
                        <div class="absolute inset-x-0 h-px bg-white/10"></div>
                        <span
                            class="relative bg-surface-container/60 px-4 text-xs font-label-sm text-outline uppercase tracking-wider">Or
                            continue with</span>
                    </div>
                    <div>
                        <button
                            class="w-full py-3 px-6 bg-surface-container-highest/30 border border-white/10 hover:bg-surface-container-highest hover:border-white/20 text-on-surface font-label-md text-label-md rounded-lg transition-all duration-200 flex items-center justify-center gap-3"
                            type="button">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853"></path>
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335"></path>
                            </svg>
                            Sign up with Google
                        </button>
                    </div>
                </form>
                <div class="mt-8 text-center">
                    <p class="font-body-md text-sm text-on-surface-variant">
                        Already have an account?
                        <a class="text-primary hover:text-primary-fixed transition-colors font-label-md" href="login.html">Log
                            in</a>
                    </p>
                </div>
            </div>
            <!-- Minimalistic Footer Links for Auth Page -->
            <div class="absolute bottom-6 w-full text-center lg:text-left lg:left-margin_desktop z-10">
                <div class="flex justify-center lg:justify-start gap-6 text-xs font-label-sm text-outline-variant">
                    <a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
                    <a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
                </div>
            </div>
        </div>
    </main>
    <script>
        async function handleSignUp() {
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !email || !password) {
                alert('Please fill in all required fields.');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.message || 'Registration failed.');
                    return;
                }

                alert('Account created successfully! Redirecting you to the login page...');
                window.location.href = 'login.html';
            } catch (err) {
                console.error('Signup error:', err);
                alert('Connection error. Please check your backend connection.');
            }
        }
    </script>
</body>

</html>
