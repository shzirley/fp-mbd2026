<body class="bg-background text-on-background min-h-screen flex overflow-hidden">
    <!-- Left Side: Cinematic Graphic (Hidden on mobile) -->
    <div class="hidden lg:block lg:w-1/2 relative bg-surface-container-lowest">
        <!-- Image Placeholder exactly as requested -->
        <img alt="Cinematic dark theater interior with neon glowing accents and a large screen displaying Movie Magic."
            class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-lighten"
            src="https://lh3.googleusercontent.com/aida/AP1WRLs46v1HNlK7a9ixhJuRRkYs23RLSqshrLI9k6LWydrUCu01tpHSoKvcefeX0HFv5nXhDSHgpj08QsaV2y9HoTjzx92WLbc1h0p8-ykARj73ckFPhGfpPJvDGpnAFsza5R0cbp-aQbZq4FYyovuiuOCi-EmH8kNLSmcqtEvHYs2IG4X1YvBgwBXDf9T0AuUtt6JFdbPurg88V2gJf6sVNesPEM5ubRzlqs3VT3_-2_Udk8KW4lvJAxCa8MU">
        <!-- Gradient Overlay to blend into the form side -->
        <div
            class="absolute inset-0 bg-gradient-to-r from-background/10 via-background/40 to-background pointer-events-none">
        </div>
        <!-- Decorative subtle branding -->
        <div class="absolute bottom-12 left-12">
            <h2 class="font-headline-lg text-headline-lg text-primary tracking-tight">Immersive Operations.</h2>
            <p class="font-body-md text-body-md text-on-surface-variant max-w-sm mt-4">Precision ticketing and theater
                management designed for the premium cinema experience.</p>
        </div>
    </div>
    <!-- Right Side: Login Form Canvas -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16 relative">
        <!-- Subtle ambient background glow -->
        <div
            class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none">
        </div>
        <div
            class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-tertiary-container/5 rounded-full blur-[100px] pointer-events-none">
        </div>
        <!-- Glassmorphism Login Card -->
        <div
            class="w-full max-w-md bg-surface-container-high/40 backdrop-blur-2xl border border-white/5 rounded-[24px] p-8 md:p-10 shadow-2xl relative z-10 cinematic-glow">
            <!-- Header -->
            <div class="mb-10 text-center">
                <div class="flex justify-center items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-primary text-4xl"
                        style="font-variation-settings: 'FILL' 1;">movie_filter</span>
                    <h1 class="font-display-lg text-headline-lg text-on-surface tracking-tighter">Cinetrack</h1>
                </div>
                <p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your dashboard</p>
            </div>
            <!-- Form -->
            <div class="space-y-6 text-center">
                <!-- Role Toggle -->
                <div class="flex w-full mb-6 bg-surface-container-high rounded-lg p-1 border border-outline-variant/30">
                    <button
                        type="button"
                        id="btn-role-customer"
                        onclick="setRole('user')"
                        class="flex-1 py-2 text-sm font-medium rounded-md transition-all bg-primary-container text-on-primary-container shadow-lg"
                    >
                        Customer
                    </button>
                    <button
                        type="button"
                        id="btn-role-employee"
                        onclick="setRole('admin')"
                        class="flex-1 py-2 text-sm font-medium rounded-md transition-all text-on-surface-variant hover:text-white"
                    >
                        Employee
                    </button>
                </div>

                <p class="text-on-surface-variant font-body-md text-sm mb-4">Pilih peran Anda dan akses sistem Cinetrack dengan aman menggunakan akun Google.</p>
                
                <div id="g_id_onload"
                     data-client_id="796791798470-01rft1ussl08kclbgr5mgt2v2gud5rj6.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleCredentialResponse"
                     data-auto_prompt="false">
                </div>

                <div class="g_id_signin flex justify-center"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="filled_black"
                     data-text="continue_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
            <!-- Footer Link -->
            <div class="mt-8 text-center">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    Punya akun Admin lokal? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-fixed hover:underline transition-all cursor-pointer" onclick="alert('Login lokal dinonaktifkan sementara demi keamanan. Silakan login menggunakan Google Workspace perusahaan.')">Gunakan Bypass</a>
                </p>
            </div>
        </div>
    </div>
    <script>
        let selectedRole = 'user';

        function setRole(role) {
            selectedRole = role;
            const btnCustomer = document.getElementById('btn-role-customer');
            const btnEmployee = document.getElementById('btn-role-employee');

            if (role === 'user') {
                btnCustomer.className = "flex-1 py-2 text-sm font-medium rounded-md transition-all bg-primary-container text-on-primary-container shadow-lg";
                btnEmployee.className = "flex-1 py-2 text-sm font-medium rounded-md transition-all text-on-surface-variant hover:text-white";
            } else {
                btnEmployee.className = "flex-1 py-2 text-sm font-medium rounded-md transition-all bg-primary-container text-on-primary-container shadow-lg";
                btnCustomer.className = "flex-1 py-2 text-sm font-medium rounded-md transition-all text-on-surface-variant hover:text-white";
            }
        }

        async function handleGoogleCredentialResponse(response) {
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential, role: selectedRole })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || 'Login failed.');
                    return;
                }

                // Store user session in localStorage
                data.user.role = data.role;
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('token', data.token);

                // Redirect based on role
                if (data.role === 'admin') {
                    window.location.href = 'adminDashboard.html';
                } else {
                    window.location.href = 'userHome.html';
                }
            } catch (err) {
                console.error('Google Login error:', err);
                alert('Connection error. Please ensure the backend server is running.');
            }
        }
    </script>
