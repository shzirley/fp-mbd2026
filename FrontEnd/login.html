                        "on-primary-fixed-variant": "#920028",
                        "background": "#0b1326",

                        "on-tertiary-fixed-variant": "#005142",
                        "surface": "#0b1326",

                        "tertiary-fixed-dim": "#74d8bd",
                        "surface-container-highest": "#2d3449",
                        "surface-container": "#171f33",
                        "tertiary-fixed": "#90f5d9",
                        "secondary-fixed-dim": "#eec200",
                        "outline": "#ac8889",
                        "tertiary-container": "#00836c",

                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }]

                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Cinematic glow effect */
        .cinematic-glow {
            box-shadow: 0 0 40px -10px rgba(225, 29, 72, 0.3);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex overflow-hidden">
    <!-- Left Side: Cinematic Graphic (Hidden on mobile) -->
    <div class="hidden lg:block lg:w-1/2 relative bg-surface-container-lowest">
        <!-- Image Placeholder exactly as requested -->
        <img alt="Cinematic dark theater interior with neon glowing accents and a large screen displaying Movie Magic."
            class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-lighten"
            src="https://lh3.googleusercontent.com/aida/AP1WRLs46v1HNlK7a9ixhJuRRkYs23RLSqshrLI9k6LWydrUCu01tpHSoKvcefeX0HFv5nXhDSHgpj08QsaV2y9HoTjzx92WLbc1h0p8-ykARj73ckFPhGfpPJvDGpnAFsza5R0cbp-aQbZq4FYyovuiuOCi-EmH8kNLSmcqtEvHYs2IG4X1YvBgwBXDf9T0AuUtt6JFdbPurg88V2gJf6sVNesPEM5ubRzlqs3VT3_-2_Udk8KW4lvJAxCa8MU">
        <!-- Gradient Overlay to blend into the form side -->
        <div
            class="absolute inset-0 bg-gradient-to-r from-background/10 via-background/40 to-background pointer-events-none">
        </div>
        <!-- Decorative subtle branding -->
        <div class="absolute bottom-12 left-12">
            <h2 class="font-headline-lg text-headline-lg text-primary tracking-tight">Immersive Operations.</h2>
            <p class="font-body-md text-body-md text-on-surface-variant max-w-sm mt-4">Precision ticketing and theater
                management designed for the premium cinema experience.</p>
        </div>
    </div>
    <!-- Right Side: Login Form Canvas -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16 relative">
        <!-- Subtle ambient background glow -->
        <div
            class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none">
        </div>
        <div
            class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-tertiary-container/5 rounded-full blur-[100px] pointer-events-none">
        </div>
        <!-- Glassmorphism Login Card -->
        <div
            class="w-full max-w-md bg-surface-container-high/40 backdrop-blur-2xl border border-white/5 rounded-[24px] p-8 md:p-10 shadow-2xl relative z-10 cinematic-glow">
            <!-- Header -->
            <div class="mb-10 text-center">
                <div class="flex justify-center items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-primary text-4xl"
                        style="font-variation-settings: 'FILL' 1;">movie_filter</span>
                    <h1 class="font-display-lg text-headline-lg text-on-surface tracking-tighter">Cinetrack</h1>
                </div>
                <p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your dashboard</p>
            </div>
            <!-- Form -->
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <!-- Email Input -->
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email
                        Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-on-surface-variant/50 text-xl">mail</span>
                        </div>
                        <input
                            class="block w-full pl-11 pr-4 py-3 bg-surface-container/50 border border-outline-variant/50 rounded-xl text-on-surface font-body-md placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container transition-all outline-none"
                            id="email" name="email" placeholder="director@cinema.com" required="" type="email">
                    </div>
                </div>
                <!-- Password Input -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
                        <a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors"
                            href="#">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-on-surface-variant/50 text-xl">lock</span>
                        </div>
                        <input
                            class="block w-full pl-11 pr-12 py-3 bg-surface-container/50 border border-outline-variant/50 rounded-xl text-on-surface font-body-md placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface-container transition-all outline-none"
                            id="password" name="password" placeholder="••••••••" required="" type="password">
                        <div
                            class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-on-surface-variant hover:text-on-surface transition-colors">
                            <span class="material-symbols-outlined text-xl">visibility</span>
                        </div>
                    </div>
                </div>
                <!-- Primary Submit Button -->
                <button
                    class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent rounded-xl shadow-sm font-label-md text-label-md text-on-primary-container bg-primary-container hover:bg-inverse-primary hover:shadow-[0_0_20px_rgba(225,29,72,0.4)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background transition-all duration-300"
                    type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </button>
            </form>
            <!-- Divider -->
            <div class="mt-8 mb-6 relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant/30"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span
                        class="px-4 bg-[#141b2d] font-label-sm text-label-sm text-on-surface-variant rounded-full border border-outline-variant/20">Or
                        continue with</span>
                </div>
            </div>
            <!-- Social Login -->
            <div>
                <button
                    class="w-full flex justify-center items-center gap-3 py-3 px-4 rounded-xl border border-outline-variant/50 bg-surface-container/30 font-label-md text-label-md text-on-surface hover:bg-surface-container hover:border-outline transition-colors duration-200"
                    type="button">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4"></path>
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853"></path>
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05"></path>
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335"></path>
                    </svg>
                    Continue with Google
                </button>
            </div>
            <!-- Footer Link -->
            <div class="mt-8 text-center">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account?
                    <a class="font-label-md text-label-md text-primary hover:text-primary-fixed hover:underline transition-all"
                        href="signUp.html">Sign up</a>
                </p>
            </div>
        </div>
    </div>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.message || 'Login failed. Please check your credentials.');
                    return;
                }

                // Store user session in localStorage
                localStorage.setItem('user', JSON.stringify(data));

                // Redirect based on role
                if (data.role === 'admin') {
                    window.location.href = 'adminDashboard.html';
                } else {
                    window.location.href = 'userHome.html';
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Connection error. Please ensure the backend server is running.');
            }
        }
    </script>
</body>

</html>
